<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="384" viewBox="0 0 1280 384" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1524"/>
      <stop offset="0.55" stop-color="#141b2e"/>
      <stop offset="1" stop-color="#1b2036"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2AABEE"/>
      <stop offset="1" stop-color="#1f8fd0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2AABEE"/>
      <stop offset="1" stop-color="#25D366"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="384" rx="0" fill="url(#bg)"/>

  <!-- faint decorative dot grid -->
  <g fill="#2f3b57" opacity="0.35">
    <circle cx="1150" cy="60" r="3"/><circle cx="1190" cy="60" r="3"/><circle cx="1230" cy="60" r="3"/>
    <circle cx="1150" cy="100" r="3"/><circle cx="1190" cy="100" r="3"/><circle cx="1230" cy="100" r="3"/>
    <circle cx="1150" cy="140" r="3"/><circle cx="1190" cy="140" r="3"/><circle cx="1230" cy="140" r="3"/>
  </g>

  <!-- brand tile -->
  <rect x="80" y="126" width="132" height="132" rx="30" fill="url(#tile)"/>
  <g transform="translate(112,158) scale(2.83)" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7a8.5 8.5 0 0 1-.9-3.8A8.38 8.38 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z"/>
    <path d="M8.5 12.5l2.5 2.5 4.5-5"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="252" y="176" font-size="76" font-weight="700" fill="#ffffff" letter-spacing="-1">Yapper</text>
  <rect x="254" y="196" width="120" height="4" rx="2" fill="url(#accent)"/>
  <text x="254" y="240" font-size="25" fill="#aeb8ca">Unified Developer Messenger for VS&#160;Code</text>
  <text x="254" y="274" font-size="17" fill="#6f7b93">Share code, diffs &amp; commits straight into a chat — without leaving the editor</text>

  <!-- messenger pills -->
  <g transform="translate(254,300)" font-size="15" font-weight="600">
    <g>
      <rect x="0" y="0" width="128" height="34" rx="17" fill="#1c2740" stroke="#2b3a5c"/>
      <circle cx="22" cy="17" r="6" fill="#2AABEE"/>
      <text x="38" y="22" fill="#dfe6f2">Telegram</text>
    </g>
    <g transform="translate(142,0)">
      <rect x="0" y="0" width="176" height="34" rx="17" fill="#1c2740" stroke="#2b3a5c"/>
      <circle cx="22" cy="17" r="6" fill="#25D366"/>
      <text x="38" y="22" fill="#dfe6f2">WhatsApp</text>
      <text x="126" y="22" fill="#6f7b93" font-size="13" font-weight="700">BETA</text>
    </g>
    <g transform="translate(332,0)">
      <rect x="0" y="0" width="162" height="34" rx="17" fill="#1c2740" stroke="#2b3a5c"/>
      <circle cx="22" cy="17" r="6" fill="#5865F2"/>
      <text x="38" y="22" fill="#dfe6f2">Discord</text>
      <text x="112" y="22" fill="#6f7b93" font-size="13" font-weight="700">BETA</text>
    </g>
    <g transform="translate(508,0)">
      <rect x="0" y="0" width="176" height="34" rx="17" fill="#151d31" stroke="#26324e"/>
      <text x="20" y="22" fill="#6f7b93">＋ Slack · Teams</text>
    </g>
  </g>

  <!-- right-side "share from editor" motif -->
  <g transform="translate(958,108)">
    <!-- editor card -->
    <rect x="0" y="0" width="238" height="168" rx="16" fill="#111a2c" stroke="#28344f"/>
    <circle cx="22" cy="24" r="5" fill="#ff5f56"/>
    <circle cx="42" cy="24" r="5" fill="#ffbd2e"/>
    <circle cx="62" cy="24" r="5" fill="#27c93f"/>
    <rect x="20" y="52" width="150" height="8" rx="4" fill="#33405f"/>
    <rect x="20" y="74" width="196" height="8" rx="4" fill="#2b374f"/>
    <rect x="20" y="96" width="120" height="8" rx="4" fill="#33405f"/>
    <text x="20" y="140" font-size="26" font-weight="700" fill="#2AABEE" font-family="monospace">&lt;/&gt;</text>
    <!-- arrow -->
    <g stroke="#25D366" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M150 132 h44"/>
      <path d="M184 122 l12 10 -12 10"/>
    </g>
  </g>
</svg>
